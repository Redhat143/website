<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input[type="text"] {
            margin-bottom: 10px;
            padding: 5px;
            width: 200px;
        }
        input[type="button"] {
            margin-right: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }
        #res {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: darkblue;
        }
    </style>
</head>
<body>
    <h2>Mini Calculator</h2>
    <label for="num1">Enter the First number</label>
    <input type="text" id="num1" placeholder="1st number">

    <label for="num2">Enter the Second number</label>
    <input type="text" id="num2" placeholder="2nd number">

    <input type="button" value="Add" onclick="calculate('add')">
    <input type="button" value="Subtract" onclick="calculate('subtract')">

    <div id="res"></div>

    <script>
        function calculate(operation) {
            const num1 = parseFloat(document.getElementById("num1").value);
            const num2 = parseFloat(document.getElementById("num2").value);

            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById("res").innerHTML = "⚠️ Please enter valid numbers!";
                return;
            }

            let result;
            if (operation === "add") {
                result = num1 + num2;
            } else if (operation === "subtract") {
                result = num1 - num2;
            }

            document.getElementById("res").innerHTML = `Result: ${result}`;
        }
    </script>
</body>
</html>
